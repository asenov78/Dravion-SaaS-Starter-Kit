name: Release

on:
  push:
    branches: [main]
    paths:
      - 'config/dravion.php'

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # remove once actions ship Node24 builds

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Verify PHP (pre-installed on ubuntu-latest)
        run: |
          echo "=== PHP ===" && php --version
          echo "=== Composer ===" && composer --version
          echo "=== Node ===" && node --version || true
          echo "=== NPM ===" && npm --version || true

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP "'version'\s*=>\s*'\K[^']+" config/dravion.php)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New tag — building release."
          fi

      - name: Install Composer deps (no dev)
        if: steps.check.outputs.exists == 'false'
        run: composer install --no-dev --optimize-autoloader --no-interaction --quiet

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build frontend assets
        if: steps.check.outputs.exists == 'false'
        run: npm ci --quiet && npm run build

      - name: Build installation ZIP
        if: steps.check.outputs.exists == 'false'
        id: build
        run: |
          sudo apt-get install -y zip --quiet
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="dravion-v${VERSION}.zip"

          mkdir -p storage/framework/sessions \
                   storage/framework/cache/data \
                   storage/framework/views \
                   storage/logs \
                   storage/app/public

          zip -r "$ZIP" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x ".env" \
            -x ".env.*" \
            -x "storage/app/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "bootstrap/cache/*" \
            -x "public/storage" \
            -x "public/hot" \
            -x "tests/*" \
            -x ".phpunit.result.cache" \
            -x "phpunit.xml" \
            -x "*.DS_Store"

          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "Built: ${ZIP} ($(du -sh "$ZIP" | cut -f1))"

      - name: Extract changelog
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[?" ver {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="Release v$VERSION"; fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@da05d552573ad5ede1717e338300ea0529f25d54  # v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dravion-v${{ steps.version.outputs.version }}.zip
