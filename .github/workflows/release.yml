name: Release

on:
  push:
    branches: [main]
    paths:
      - 'config/dravion.php'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Read version from config/dravion.php
        id: version
        run: |
          VERSION=$(php -r "echo require 'config/dravion.php';")
          # If the file returns an array, extract version key
          VERSION=$(php -r "\$c = require 'config/dravion.php'; echo \$c['version'];")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP
        if: steps.check.outputs.exists == 'false'
        uses: shivammathur/setup-php@c541c155eee45413f5b09a52248675b1a2575231 # v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, openssl, bcmath, gd, curl

      - name: Install Composer deps (no dev)
        if: steps.check.outputs.exists == 'false'
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend assets
        if: steps.check.outputs.exists == 'false'
        run: npm ci && npm run build

      - name: Build installation ZIP
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="dravion-v${VERSION}.zip"

          # Create storage skeleton dirs so the ZIP includes them (empty = .gitkeep)
          mkdir -p storage/framework/sessions storage/framework/cache/data storage/framework/views storage/logs storage/app/public

          zip -r "$ZIP" . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "storage/app/*" \
            --exclude "storage/logs/*" \
            --exclude "storage/framework/cache/*" \
            --exclude "storage/framework/sessions/*" \
            --exclude "storage/framework/views/*" \
            --exclude "bootstrap/cache/*" \
            --exclude "public/storage" \
            --exclude "public/hot" \
            --exclude "tests/*" \
            --exclude "*.DS_Store" \
            --exclude ".phpunit.result.cache" \
            --exclude "phpunit.xml"

          echo "Built: $ZIP ($(du -sh "$ZIP" | cut -f1))"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
        id: build

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[?" ver {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dravion-v${{ steps.version.outputs.version }}.zip
