name: Release

on:
  push:
    branches: [main]
    paths:
      - 'config/dravion.php'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, mbstring, openssl, bcmath, gd, curl

      - name: Read version
        id: version
        run: |
          VERSION=$(php -r "\$c = require 'config/dravion.php'; echo \$c['version'];")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} is new — building release."
          fi

      - name: Install Composer deps (no dev)
        if: steps.check.outputs.exists == 'false'
        run: composer install --no-dev --optimize-autoloader --no-interaction --quiet

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend assets
        if: steps.check.outputs.exists == 'false'
        run: npm ci --quiet && npm run build

      - name: Install zip
        if: steps.check.outputs.exists == 'false'
        run: sudo apt-get install -y zip

      - name: Build installation ZIP
        if: steps.check.outputs.exists == 'false'
        id: build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="dravion-v${VERSION}.zip"

          mkdir -p storage/framework/sessions \
                   storage/framework/cache/data \
                   storage/framework/views \
                   storage/logs \
                   storage/app/public

          zip -r "$ZIP" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x ".env" \
            -x ".env.*" \
            -x "storage/app/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "bootstrap/cache/*" \
            -x "public/storage" \
            -x "public/hot" \
            -x "tests/*" \
            -x ".phpunit.result.cache" \
            -x "phpunit.xml" \
            -x "*.DS_Store"

          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "Built: ${ZIP} ($(du -sh "$ZIP" | cut -f1))"

      - name: Extract changelog
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[?" ver {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="Release v$VERSION"; fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dravion-v${{ steps.version.outputs.version }}.zip
